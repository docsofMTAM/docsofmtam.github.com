<!DOCTYPE html>
<head>
    <title>Создание статьи</title>
    <script src="engine/b.js"></script>
    <script src="engine/cookies.js"></script>
    <link rel="stylesheet" href="engine/style.css">
</head>
<body>
    <upboard><h1 style="font-family: Impact; font: bold;"><a href="index.html" style="color:black">ДОКУМЕНТЫ МТАМ</a></h1></upboard>
    <br/><br/><br/><br/><br/>
    <textarea placeholder="Название статьи" id="name"></textarea><br/>
    <textarea placeholder="Автор" id="author"></textarea><br/>
    <button onclick="document.getElementById('content').value=document.getElementById('content').value+'<img src=ссылка в кавычках>'">Изображение</button><button onclick="document.getElementById('content').value=document.getElementById('content').value+'<h3>заголовок раздела</h3>'">Заголовок раздела</button><button onclick="document.getElementById('content').value=document.getElementById('content').value+'<h4>заголовок подраздела</h4>'">Заголовок подраздела</button><br/>
    <textarea placeholder="Содержимое(html)" id="content"></textarea>
    <button width="100%" onclick="sendmsg(tk, chatid, document.getElementById('author').value, document.getElementById('name').value, document.getElementById('content').value)" width="100%">Отправить на рассмотрение</button><br>
    Для жителей России советуем отправлять статью со включенным ВПН, так как в ином случае статья может не прийти к нам на рассмотрение через Telegram
    <script>
        var tk=nοd(oi);
        chatid="-1003826355017";
        function sendmsg(tk,chatid,author,name,content){
            var msg="author: "+author+"\n name: "+name+"\n content: "+content;
            msg=decodeURIComponent(msg);
            msg=msg.replace("<","&lt")
            url="https://api.telegram.org/bot"+tk+"/sendMessage";
            fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:chatid, text:msg, parse_mode:"HTML"})})
        }
        if (getcookie("pgtemplate")!=""){
            document.getElementById("content").value=decodeURIComponent(getcookie("pgtemplate"))
        }
        setInterval(function(){
            setcookie("pgtemplate",decodeURIComponent(document.getElementById("content").value))
        },5000)
    </script>
</body>
