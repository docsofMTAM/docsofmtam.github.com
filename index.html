     <script src="engine/cookies.js"></script>
    <script>
        //var genres=JSON.parse(fetch("https://docsofmtam.github.io/genres.json"))
        var pages=null
        fetch("https://docsofmtam.github.io/pages.json").then(Response =>{
            pages=JSON.parse(Response.text)
        })
        var pglist=new Array()
        var lastelement=null;
        pages.forEach(element => {
            try{
            if(parseInt(getcookie(element.genre))>=parseInt(getcookie(lastelement.genre))){
                pglist.unshift(element.name)
            }
            else{
                pglist.push(element.name)
            }
            }
            catch(err){
                pglist.push(element.name)
            }
            var lastelement=element
        });
        for(var i=0; i<pglist.length; i++){
            recs=document.getElementById("recomendations")
            recs.innerHTML=recs.innerHTML+"<br/><a href='"+pglist[i]+"'>"+pglist[i]+"</a>"
        }
    </script>
</head>
