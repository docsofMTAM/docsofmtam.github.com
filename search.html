<!DOCTYPE html>
<head>
    <title>Поиск по вики</title>
    <link rel="stylesheet" href="engine/style.css">
</head>
<body>
    <upboard><h1 style="font-family: Impact; font: bold;"><a href="index.html" style="color:black">ДОКУМЕНТЫ МТАМ</a></h1></upboard>
    <br><br><br><br><br>
    <textarea placeholder="запрос" id="search"></textarea>
    <div id="results"></div>
    <script>
    var pages;
        fetch("https://docsofmtam.github.io/pages.json").then(Response =>Response.json()).then(data => {pages=data
        var pglist=[];
        var lastelement=null;
        document.getElementById("search").addEventListener("input", (event)=>{
        document.getElementById("results").innerHTML=""
        for (var i=0;i<pages.length;i++){
            var element=pages[i]
            //var st=event.target.value.substring(ii,ii+2)
            if (element.name.includes(event.target.value)==true && pglist.includes(element.name)!=false){
                pglist.push(event.target.value)
                document.getElementById("results").innerHTML=document.getElementById("results").innerHTML+"<a class='liten' href='"+element.name+"'>"+element.name+"</a>"
            }
        }
    })
    })
    </script>
</body>
